kind = "web"
previewPath = "/"
title = "I'm Fine - Safety Check-in App"
version = "1.0.0"
id = "artifacts/imfine-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20754

[services.development]
run = "pnpm --filter @workspace/imfine-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imfine-app", "run", "build" ]
publicDir = "artifacts/imfine-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20754"
BASE_PATH = "/"
